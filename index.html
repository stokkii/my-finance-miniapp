<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wallet • Личный помощник</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #0a0a0a;
            color: #e5e5e5;
            min-h-screen pb-20;
        }
        .section { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #header {
            background: linear-gradient(to right, #7c3aed, #f97316, #ef4444);
            color: white;
            padding: 0.75rem 1.5rem;
        }
        .card, .analytics-card {
            background-color: #1a1a1a;
            border: 1px solid #333333;
        }
        .text-gray-400 { color: #a3a3a3; }
        .text-gray-500 { color: #737373; }
        #balance-amount {
            font-size: 2.05rem;
            line-height: 2.3rem;
            font-weight: 600;
        }
        .action-button {
            padding: 1.05rem 1rem;
            min-height: 108px;
        }
        .action-button .emoji {
            font-size: 2.35rem;
            margin-bottom: 0.4rem;
        }
        .action-button .label {
            font-size: 1.05rem;
            font-weight: 600;
        }
        .analytics-number {
            font-size: 1.45rem;
            line-height: 1.6rem;
            font-weight: 600;
            word-break: break-all;
        }
        .progress-bar {
            height: 8px;
            background: #333333;
            border-radius: 9999px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 9999px;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .user-avatar {
            width: 38px;
            height: 38px;
            border-radius: 9999px;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.25);
        }
        .rounded-3xl { border-radius: 1.4rem; }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div id="header" class="flex items-center justify-between shadow-lg">
        <div class="flex items-center gap-3">
            <div id="header-avatar-container" class="w-9 h-9 bg-white/20 rounded-2xl flex items-center justify-center text-2xl">💰</div>
            <div>
                <h1 class="text-xl font-semibold tracking-tight">Wallet</h1>
                <p id="user-name" class="text-sm opacity-80"></p>
            </div>
        </div>
        <div onclick="toggleBaseCurrency()" class="flex items-center bg-white/20 px-4 py-1.5 rounded-3xl text-sm font-medium cursor-pointer hover:bg-white/30 transition-colors">
            <span id="current-base-currency" class="mr-1"></span>
            <span class="text-xs">▼</span>
        </div>
    </div>

    <div id="main-content" class="p-6 pb-24 max-w-xl mx-auto">

        <!-- PAGE 1: ГЛАВНАЯ -->
        <div id="page-home" class="section">
            <div class="card rounded-3xl shadow-xl mb-8 p-6">
                <div class="text-sm text-gray-400 mb-1">Текущий баланс</div>
                <div class="flex items-baseline gap-2">
                    <div id="balance-amount" class="font-semibold tracking-tighter">0.00</div>
                    <div id="balance-currency" class="text-2xl font-medium text-emerald-400"></div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button onclick="showAddTransactionModal('income')" class="action-button flex flex-col items-center justify-center bg-emerald-950 hover:bg-emerald-900 border border-emerald-500/30 rounded-3xl active:scale-95 transition-all">
                    <div class="emoji">💰</div>
                    <div class="label text-emerald-400">+ Доход</div>
                </button>
                <button onclick="showAddTransactionModal('expense')" class="action-button flex flex-col items-center justify-center bg-rose-950 hover:bg-rose-900 border border-rose-500/30 rounded-3xl active:scale-95 transition-all">
                    <div class="emoji">🛒</div>
                    <div class="label text-rose-400">- Расход</div>
                </button>
            </div>
            <div class="mb-4 flex items-center justify-between">
                <h2 class="font-semibold text-lg">Последние операции</h2>
                <button onclick="switchPage(2)" class="text-orange-400 text-sm font-medium flex items-center gap-1">
                    Все <span class="text-xl leading-none">→</span>
                </button>
            </div>
            <div id="recent-history" class="space-y-3"></div>
        </div>

        <!-- PAGE 2: ИСТОРИЯ -->
        <div id="page-history" class="section hidden">
            <h2 class="font-semibold text-2xl mb-6">История операций</h2>
            <div id="full-history" class="space-y-3 max-h-[calc(100vh-220px)] overflow-y-auto pr-2"></div>
        </div>

        <!-- PAGE 3: КАТЕГОРИИ -->
        <div id="page-categories" class="section hidden">
            <h2 class="font-semibold text-2xl mb-6">Категории</h2>
            <div class="mb-8">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-medium text-emerald-400">Доходы</h3>
                    <button onclick="addCategory('income')" class="px-5 py-2 bg-emerald-600 text-white text-sm font-medium rounded-2xl flex items-center gap-2 active:scale-95">
                        <span class="text-xl">+</span> Добавить
                    </button>
                </div>
                <div id="income-categories" class="space-y-2"></div>
            </div>
            <div>
                <div class="flex justify-between items-center mb-3">
                    <h3 class="font-medium text-rose-400">Расходы</h3>
                    <button onclick="addCategory('expense')" class="px-5 py-2 bg-rose-600 text-white text-sm font-medium rounded-2xl flex items-center gap-2 active:scale-95">
                        <span class="text-xl">+</span> Добавить
                    </button>
                </div>
                <div id="expense-categories" class="space-y-2"></div>
            </div>
        </div>

        <!-- PAGE 4: КОНВЕРТЕР С КНОПКОЙ ОБНОВЛЕНИЯ -->
        <div id="page-converter" class="section hidden">
            <h2 class="font-semibold text-2xl mb-6">Конвертер валют</h2>
            <div class="card rounded-3xl p-6 shadow-xl">
                <div class="flex justify-between items-center mb-8">
                    <select id="from-currency" onchange="convertCurrency()" class="bg-transparent text-3xl font-semibold focus:outline-none text-white"></select>
                    <button onclick="swapCurrencies()" class="w-11 h-11 bg-orange-500/20 text-3xl rounded-2xl flex items-center justify-center hover:rotate-180 transition-transform text-orange-400">⇄</button>
                    <select id="to-currency" onchange="convertCurrency()" class="bg-transparent text-3xl font-semibold focus:outline-none text-white"></select>
                </div>
                <div class="flex items-center justify-center mb-8">
                    <input id="from-amount" type="text" value="1" oninput="convertCurrency()" class="text-6xl font-semibold bg-transparent text-center w-48 focus:outline-none text-white">
                </div>
                <div id="to-amount-display" class="text-6xl font-semibold text-center text-gray-400 mb-8">0.00</div>
                <div id="conversion-rate-info" class="text-center text-sm text-gray-400"></div>

                <div class="flex justify-center mt-8">
                    <button onclick="forceUpdateRates()" 
                            class="px-8 py-3.5 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-3xl text-sm font-semibold active:scale-95 transition-all flex items-center gap-2">
                        🔄 Обновить курсы сейчас
                    </button>
                </div>
            </div>
        </div>

        <!-- PAGE 5: АНАЛИТИКА -->
        <div id="page-analytics" class="section hidden">
            <h2 class="font-semibold text-2xl mb-6">Аналитика</h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="analytics-card card rounded-3xl p-6">
                    <div class="text-sm text-gray-400">Доходы за месяц</div>
                    <div id="total-income" class="analytics-number text-emerald-400 mt-2">0</div>
                </div>
                <div class="analytics-card card rounded-3xl p-6">
                    <div class="text-sm text-gray-400">Расходы за месяц</div>
                    <div id="total-expense" class="analytics-number text-rose-400 mt-2">0</div>
                </div>
            </div>
            <div class="card rounded-3xl p-6 mb-6">
                <h3 class="font-medium mb-5 text-orange-300">Распределение расходов</h3>
                <div id="expense-distribution" class="space-y-5"></div>
            </div>
            <div class="card rounded-3xl p-6">
                <h3 class="font-medium mb-4 text-orange-300">Круговая диаграмма</h3>
                <div class="flex justify-center">
                    <canvas id="pie-chart" class="w-full max-h-60"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-800">
        <div class="max-w-xl mx-auto grid grid-cols-5 text-xs font-medium">
            <div onclick="switchPage(1)" class="nav-item flex flex-col items-center py-3 text-orange-400">🏠<br>Главная</div>
            <div onclick="switchPage(2)" class="nav-item flex flex-col items-center py-3 text-gray-400">📜<br>История</div>
            <div onclick="switchPage(3)" class="nav-item flex flex-col items-center py-3 text-gray-400">📂<br>Категории</div>
            <div onclick="switchPage(4)" class="nav-item flex flex-col items-center py-3 text-gray-400">🔄<br>Конвертер</div>
            <div onclick="switchPage(5)" class="nav-item flex flex-col items-center py-3 text-gray-400">📊<br>Аналитика</div>
        </div>
    </div>

    <!-- MODAL -->
    <div onclick="if(event.target.id === 'add-modal') hideAddTransactionModal()" id="add-modal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-end">
        <div onclick="event.stopImmediatePropagation()" class="modal bg-zinc-900 w-full rounded-t-3xl p-6 max-h-[85vh] overflow-y-auto">
            <h2 id="modal-title" class="text-2xl font-semibold mb-6 text-white">Новая операция</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Сумма</label>
                    <input id="modal-amount" type="text" class="w-full text-5xl font-semibold bg-transparent border-b-2 border-zinc-700 focus:border-orange-500 outline-none text-white">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Валюта</label>
                        <select id="modal-currency" class="w-full text-xl py-3 px-4 rounded-2xl border border-zinc-700 focus:border-orange-500 bg-zinc-900 text-white"></select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Тип</label>
                        <div id="modal-type-toggle" class="flex rounded-3xl bg-zinc-800 p-1">
                            <button onclick="setModalType('income')" id="modal-btn-income" class="flex-1 py-3 rounded-3xl text-sm font-medium">Доход</button>
                            <button onclick="setModalType('expense')" id="modal-btn-expense" class="flex-1 py-3 rounded-3xl text-sm font-medium">Расход</button>
                        </div>
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Категория</label>
                    <select id="modal-category" class="w-full text-xl py-3 px-4 rounded-2xl border border-zinc-700 focus:border-orange-500 bg-zinc-900 text-white"></select>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Заметка (необязательно)</label>
                    <input id="modal-note" type="text" placeholder="Например: Зарплата за март" class="w-full py-4 px-5 rounded-3xl border border-zinc-700 focus:border-orange-500 bg-zinc-900 text-white">
                </div>
                <div class="flex gap-4">
                    <button onclick="hideAddTransactionModal()" class="flex-1 py-5 text-lg font-medium border border-zinc-700 rounded-3xl text-gray-300">Отмена</button>
                    <button onclick="saveTransaction()" class="flex-1 py-5 text-lg font-semibold bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-3xl active:scale-95">Сохранить</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" onclick="this.classList.add('hidden')" class="hidden fixed bottom-24 left-1/2 -translate-x-1/2 bg-orange-600 text-white px-6 py-3 rounded-3xl shadow-2xl text-sm z-50">
        <span id="toast-text"></span>
    </div>

    <script>
        // ====================== ТОКЕН ТВОЕГО БОТА ======================
        const BOT_TOKEN = "8302690952:AAFy8P2sLm9FTIzGm5FGNJORmwPuz892pSE";

        async function validateTelegramInitData(initData, botToken) {
            try {
                if (!initData) return false;
                const urlParams = new URLSearchParams(initData);
                const hash = urlParams.get('hash');
                if (!hash) return false;
                urlParams.delete('hash');
                const dataCheckArr = Array.from(urlParams.entries())
                    .sort((a, b) => a[0].localeCompare(b[0]))
                    .map(([key, value]) => `${key}=${value}`);
                const dataCheckString = dataCheckArr.join('\n');
                const encoder = new TextEncoder();
                const secretKey = await crypto.subtle.importKey("raw", encoder.encode("WebAppData"), { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
                const secret = await crypto.subtle.sign("HMAC", secretKey, encoder.encode(botToken));
                const signature = await crypto.subtle.sign("HMAC", await crypto.subtle.importKey("raw", secret, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]), encoder.encode(dataCheckString));
                const calculatedHash = Array.from(new Uint8Array(signature)).map(b => b.toString(16).padStart(2, '0')).join('');
                return calculatedHash === hash;
            } catch (e) {
                console.error("Validation error:", e);
                return false;
            }
        }

        let TELEGRAM_USER_ID = 'demo';
        let BASE_CURRENCY = 'USD';
        let lastRatesUpdate = null;

        const CURRENCIES = [
            { code: 'CZK', name: 'Крона', symbol: 'Kč' },
            { code: 'UAH', name: 'Гривна', symbol: '₴' },
            { code: 'USD', name: 'Доллар', symbol: '$' },
            { code: 'EUR', name: 'Евро', symbol: '€' },
            { code: 'RUB', name: 'Рубль', symbol: '₽' }
        ];

        let DATA = {
            categories: {
                income: [{id:1,name:'Зарплата'},{id:2,name:'Фриланс'},{id:3,name:'Инвестиции'},{id:4,name:'Другое'}],
                expense: [{id:5,name:'Еда'},{id:6,name:'Транспорт'},{id:7,name:'Жильё'},{id:8,name:'Развлечения'},{id:9,name:'Здоровье'},{id:10,name:'Другое'}]
            },
            transactions: []
        };

        let ratesToUSD = {};
        const FALLBACK_RATES = {
            USD: 1.00000, EUR: 1.16850, UAH: 0.02302, RUB: 0.01285, CZK: 0.04807
        };

        const COLOR_PALETTE = ['#7c3aed', '#f97316', '#ef4444', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#6366f1', '#22c55e'];

        function getCategoryColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return COLOR_PALETTE[Math.abs(hash) % COLOR_PALETTE.length];
        }

        // ==================== УЛУЧШЕННАЯ ЗАГРУЗКА КУРСОВ ====================
        let lastForceUpdateTime = 0;

        async function loadRates(force = false) {
            const now = Date.now();
            if (force && now - lastForceUpdateTime < 300000) { // 5 минут
                console.log("🔄 Обновление слишком частое — пропускаем");
                return true;
            }

            try {
                const timestamp = Date.now();
                const url = `https://api.exchangerate.host/latest?base=USD&v=${timestamp}&force=${force ? 1 : 0}`;

                const res = await fetch(url, {
                    cache: 'no-store',
                    headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate' }
                });

                if (res.ok) {
                    const json = await res.json();
                    if (json.rates && Object.keys(json.rates).length > 30) {
                        ratesToUSD = json.rates;
                        lastRatesUpdate = new Date();
                        if (force) lastForceUpdateTime = now;
                        console.log(`✅ Курсы обновлены в ${lastRatesUpdate.toLocaleTimeString('ru-RU')}`);
                        return true;
                    }
                }
            } catch (e) {
                console.error("❌ Ошибка загрузки курсов:", e);
            }

            if (!ratesToUSD || Object.keys(ratesToUSD).length < 5) {
                ratesToUSD = {...FALLBACK_RATES};
                console.log("⚠️ Используются резервные курсы");
            }
            return false;
        }

        function getTimeSinceUpdate() {
            if (!lastRatesUpdate) return '—';
            const min = Math.floor((Date.now() - lastRatesUpdate.getTime()) / 60000);
            return min < 1 ? 'только что' : min < 60 ? `${min} мин. назад` : `${Math.floor(min/60)} ч. назад`;
        }

        function convertAmount(amount, from, to) {
            if (from === to) return parseFloat(amount) || 0;
            const rates = ratesToUSD || FALLBACK_RATES;
            return (amount * (rates[from] || 1)) / (rates[to] || 1);
        }

        async function calculateBalance() {
            await loadRates();
            let total = 0;
            DATA.transactions.forEach(tx => {
                const val = convertAmount(tx.amount, tx.currency, BASE_CURRENCY);
                total += tx.type === 'income' ? val : -val;
            });
            return total;
        }

        async function renderBalance() {
            const balance = await calculateBalance();
            const cur = CURRENCIES.find(c => c.code === BASE_CURRENCY);
            document.getElementById('balance-amount').textContent = balance.toLocaleString('ru-RU', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('balance-currency').innerHTML = `${cur.symbol} <span class="text-base">${cur.code}</span>`;
        }

        function formatAmount(amount) {
            return Math.round(amount).toLocaleString('ru-RU').replace(/,/g, ' ');
        }

        async function convertCurrency() {
            await loadRates(false);
            const from = document.getElementById('from-currency').value;
            const to = document.getElementById('to-currency').value;
            let amt = parseFloat(document.getElementById('from-amount').value) || 0;
            const result = convertAmount(amt, from, to);
            document.getElementById('to-amount-display').textContent = result.toFixed(2);

            const rate = convertAmount(1, from, to);
            document.getElementById('conversion-rate-info').innerHTML = `
                1 ${from} = ${rate.toFixed(4)} ${to}<br>
                <span class="text-xs text-gray-500">Обновлено: ${getTimeSinceUpdate()}</span>
            `;
        }

        async function forceUpdateRates() {
            showToast('Обновляем курсы...');
            const success = await loadRates(true);
            showToast(success ? 'Курсы обновлены ✓' : 'Не удалось обновить');
            convertCurrency();
        }

        function swapCurrencies() {
            const f = document.getElementById('from-currency');
            const t = document.getElementById('to-currency');
            const temp = f.value; f.value = t.value; t.value = temp;
            convertCurrency();
        }

        function populateConverterSelects() {
            const selects = ['from-currency', 'to-currency'];
            selects.forEach((id, i) => {
                const sel = document.getElementById(id);
                sel.innerHTML = '';
                CURRENCIES.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.code;
                    opt.textContent = `${c.code} ${c.symbol}`;
                    if (i === 0 && c.code === 'EUR') opt.selected = true;
                    if (i === 1 && c.code === 'UAH') opt.selected = true;
                    sel.appendChild(opt);
                });
            });
        }

        // ==================== ОСТАЛЬНЫЕ ФУНКЦИИ (без изменений) ====================
        function renderRecentHistory() { /* ... твой оригинальный код ... */ 
            const container = document.getElementById('recent-history');
            container.innerHTML = '';
            const recent = [...DATA.transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,5);
            if (recent.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">Пока нет операций</div>`;
                return;
            }
            recent.forEach(tx => {
                const cat = findCategoryById(tx.categoryId);
                const div = document.createElement('div');
                div.className = `transaction-item flex justify-between items-center bg-zinc-900 px-5 py-4 rounded-3xl shadow-sm text-sm`;
                div.innerHTML = `
                    <div class="flex items-center gap-3 flex-1">
                        <span class="text-3xl">${tx.type === 'income' ? '💰' : '🛒'}</span>
                        <div class="flex-1 min-w-0">
                            <div class="font-medium truncate">${cat ? cat.name : 'Без категории'}</div>
                            <div class="text-xs text-gray-400">${new Date(tx.date).toLocaleDateString('ru-RU')}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="${tx.type === 'income' ? 'text-emerald-400' : 'text-rose-400'} font-semibold">
                            ${tx.type === 'income' ? '+' : '-'}${tx.amount.toFixed(2)} ${tx.currency}
                        </div>
                    </div>
                    <button onclick="deleteTransaction(${tx.id});event.stopImmediatePropagation()" class="ml-4 text-2xl text-rose-400">🗑</button>
                `;
                container.appendChild(div);
            });
        }

        function renderFullHistory() { /* твой оригинальный код */ 
            const container = document.getElementById('full-history');
            container.innerHTML = '';
            if (DATA.transactions.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-gray-400">История пуста</div>`;
                return;
            }
            const sorted = [...DATA.transactions].sort((a,b) => new Date(b.date) - new Date(a.date));
            sorted.forEach(tx => {
                const cat = findCategoryById(tx.categoryId);
                const div = document.createElement('div');
                div.className = `transaction-item flex justify-between items-center bg-zinc-900 px-5 py-4 rounded-3xl shadow-sm text-sm`;
                div.innerHTML = `
                    <div class="flex-1 flex items-center gap-3">
                        <span class="text-3xl">${tx.type === 'income' ? '💰' : '🛒'}</span>
                        <div class="flex-1">
                            <div class="font-medium">${cat ? cat.name : 'Без категории'}</div>
                            <div class="text-xs text-gray-400">${new Date(tx.date).toLocaleDateString('ru-RU')}</div>
                            ${tx.note ? `<div class="text-xs text-gray-400">${tx.note}</div>` : ''}
                        </div>
                    </div>
                    <div class="${tx.type === 'income' ? 'text-emerald-400' : 'text-rose-400'} font-semibold">
                        ${tx.type === 'income' ? '+' : '-'}${tx.amount.toFixed(2)} ${tx.currency}
                    </div>
                    <button onclick="deleteTransaction(${tx.id});event.stopImmediatePropagation()" class="ml-6 text-2xl text-rose-400">🗑</button>
                `;
                container.appendChild(div);
            });
        }

        function deleteTransaction(id) {
            if (!confirm('Удалить операцию?')) return;
            DATA.transactions = DATA.transactions.filter(t => t.id !== id);
            saveData();
            renderRecentHistory();
            renderFullHistory();
            renderBalance();
            renderAnalytics();
            showToast('Операция удалена');
        }

        let currentModalType = 'income';

        function showAddTransactionModal(type) {
            currentModalType = type;
            document.getElementById('add-modal').classList.remove('hidden');
            document.getElementById('modal-title').textContent = type === 'income' ? 'Новый доход' : 'Новый расход';
            const incomeBtn = document.getElementById('modal-btn-income');
            const expenseBtn = document.getElementById('modal-btn-expense');
            if (type === 'income') {
                incomeBtn.classList.add('bg-emerald-600','text-white');
                expenseBtn.classList.remove('bg-emerald-600','text-white');
            } else {
                expenseBtn.classList.add('bg-rose-600','text-white');
                incomeBtn.classList.remove('bg-emerald-600','text-white');
            }
            const curSelect = document.getElementById('modal-currency');
            curSelect.innerHTML = '';
            CURRENCIES.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.code;
                opt.textContent = `${c.name} (${c.symbol})`;
                curSelect.appendChild(opt);
            });
            renderModalCategories(type);
        }

        function setModalType(type) {
            currentModalType = type;
            showAddTransactionModal(type);
        }

        function hideAddTransactionModal() {
            document.getElementById('add-modal').classList.add('hidden');
        }

        function renderModalCategories(type) {
            const select = document.getElementById('modal-category');
            select.innerHTML = '';
            DATA.categories[type].forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.id;
                opt.textContent = cat.name;
                select.appendChild(opt);
            });
        }

        function saveTransaction() {
            const amount = parseFloat(document.getElementById('modal-amount').value);
            if (!amount || amount <= 0) return alert('Введите сумму > 0');
            const currency = document.getElementById('modal-currency').value;
            const categoryId = parseInt(document.getElementById('modal-category').value);
            const note = document.getElementById('modal-note').value.trim();
            DATA.transactions.push({
                id: Date.now(),
                type: currentModalType,
                amount: amount,
                currency: currency,
                categoryId: categoryId,
                note: note,
                date: new Date().toISOString()
            });
            saveData();
            hideAddTransactionModal();
            renderRecentHistory();
            renderFullHistory();
            renderBalance();
            renderAnalytics();
            showToast(currentModalType === 'income' ? 'Доход добавлен ✅' : 'Расход добавлен ✅');
        }

        function findCategoryById(id) {
            for (let type in DATA.categories) {
                const found = DATA.categories[type].find(c => c.id === id);
                if (found) return found;
            }
            return null;
        }

        function renderCategories() {
            ['income','expense'].forEach(type => {
                const container = document.getElementById(type + '-categories');
                container.innerHTML = '';
                DATA.categories[type].forEach(cat => {
                    const div = document.createElement('div');
                    div.className = `flex justify-between items-center bg-zinc-900 px-5 py-4 rounded-3xl shadow-sm text-sm border border-zinc-800`;
                    div.innerHTML = `<span class="font-medium">${cat.name}</span><button onclick="deleteCategory(${cat.id},'${type}');event.stopImmediatePropagation()" class="text-rose-400 text-2xl">🗑</button>`;
                    container.appendChild(div);
                });
            });
        }

        function addCategory(type) {
            const name = prompt(`Название новой категории (${type === 'income' ? 'доход' : 'расход'})?`);
            if (!name?.trim()) return;
            DATA.categories[type].push({id: Date.now(), name: name.trim()});
            saveData();
            renderCategories();
            renderAnalytics();
            showToast('Категория добавлена');
        }

        function deleteCategory(id, type) {
            if (!confirm('Удалить категорию?')) return;
            DATA.categories[type] = DATA.categories[type].filter(c => c.id !== id);
            saveData();
            renderCategories();
            renderAnalytics();
            showToast('Категория удалена');
        }

        let chartInstance = null;

        async function renderAnalytics() {
            await loadRates();
            let income = 0, expense = 0;
            const catMap = {};
            const now = new Date();
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();

            DATA.transactions.filter(tx => tx.date >= monthStart).forEach(tx => {
                const val = convertAmount(tx.amount, tx.currency, BASE_CURRENCY);
                if (tx.type === 'income') income += val;
                else {
                    expense += val;
                    const cat = findCategoryById(tx.categoryId);
                    const name = cat ? cat.name : 'Другое';
                    catMap[name] = (catMap[name] || 0) + val;
                }
            });

            document.getElementById('total-income').innerHTML = `${formatAmount(income)}<br><span class="text-base font-medium opacity-80">${BASE_CURRENCY}</span>`;
            document.getElementById('total-expense').innerHTML = `${formatAmount(expense)}<br><span class="text-base font-medium opacity-80">${BASE_CURRENCY}</span>`;

            const distributionContainer = document.getElementById('expense-distribution');
            distributionContainer.innerHTML = '';
            const totalExpense = Object.values(catMap).reduce((a, b) => a + b, 0);

            if (totalExpense === 0) {
                distributionContainer.innerHTML = `<div class="text-center py-12"><div class="text-5xl mb-4">📊</div><div class="text-gray-400 text-lg">Нет расходов за этот месяц</div></div>`;
                if (chartInstance) chartInstance.destroy();
                return;
            }

            const sortedCategories = Object.entries(catMap).sort((a, b) => b[1] - a[1]);
            sortedCategories.forEach(([name, amount]) => {
                const percent = ((amount / totalExpense) * 100).toFixed(1);
                const color = getCategoryColor(name);
                const div = document.createElement('div');
                div.className = "space-y-2";
                div.innerHTML = `
                    <div class="flex justify-between text-sm">
                        <div class="font-medium">${name}</div>
                        <div class="text-right">
                            <span class="font-semibold">${formatAmount(amount)} ${BASE_CURRENCY}</span>
                            <span class="text-emerald-400 ml-3">${percent}%</span>
                        </div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percent}%; background: ${color};"></div>
                    </div>
                `;
                distributionContainer.appendChild(div);
            });

            const ctx = document.getElementById('pie-chart');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: sortedCategories.map(([name]) => name),
                    datasets: [{
                        data: sortedCategories.map(([, val]) => val),
                        backgroundColor: sortedCategories.map(([name]) => getCategoryColor(name)),
                        borderWidth: 5,
                        borderColor: '#1a1a1a'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '68%',
                    plugins: { legend: { display: false } }
                }
            });
        }

        function switchPage(page) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
            if (page === 1) document.getElementById('page-home').classList.remove('hidden');
            if (page === 2) { document.getElementById('page-history').classList.remove('hidden'); renderFullHistory(); }
            if (page === 3) { document.getElementById('page-categories').classList.remove('hidden'); renderCategories(); }
            if (page === 4) {
                document.getElementById('page-converter').classList.remove('hidden');
                if (!document.getElementById('from-currency').hasChildNodes()) populateConverterSelects();
                forceUpdateRates();   // принудительное обновление при открытии
            }
            if (page === 5) {
                document.getElementById('page-analytics').classList.remove('hidden');
                renderAnalytics();
            }

            document.querySelectorAll('.nav-item').forEach((item, i) => {
                item.classList.toggle('text-orange-400', i+1 === page);
                item.classList.toggle('text-gray-400', i+1 !== page);
            });
        }

        function toggleBaseCurrency() {
            let idx = CURRENCIES.findIndex(c => c.code === BASE_CURRENCY);
            BASE_CURRENCY = CURRENCIES[(idx + 1) % CURRENCIES.length].code;
            updateCurrentBaseDisplay();
            saveData();
            renderBalance();
            renderAnalytics();
            showToast(`База: ${BASE_CURRENCY}`);
        }

        function updateCurrentBaseDisplay() {
            const c = CURRENCIES.find(cur => cur.code === BASE_CURRENCY);
            document.getElementById('current-base-currency').innerHTML = `${c.symbol} <span class="text-xs">${c.code}</span>`;
        }

        function getStorageKey() { return `finance_data_${TELEGRAM_USER_ID}`; }

        function loadData() {
            const saved = localStorage.getItem(getStorageKey());
            if (saved) {
                const parsed = JSON.parse(saved);
                DATA = parsed;
                if (parsed.baseCurrency) BASE_CURRENCY = parsed.baseCurrency;
            }
            updateCurrentBaseDisplay();
        }

        function saveData() {
            DATA.baseCurrency = BASE_CURRENCY;
            localStorage.setItem(getStorageKey(), JSON.stringify(DATA));
        }

        function showToast(text) {
            const t = document.getElementById('toast');
            document.getElementById('toast-text').textContent = text;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2800);
        }

        function applyTelegramTheme() {
            const tg = window.Telegram?.WebApp;
            if (!tg) return;
            const header = document.getElementById('header');
            if (header) header.style.background = `linear-gradient(to right, #7c3aed, #f97316, #ef4444)`;
        }

        // ====================== ИНИЦИАЛИЗАЦИЯ ======================
        async function initApp() {
            const tg = window.Telegram?.WebApp;
            if (tg) {
                tg.expand();
                tg.ready();
                const isValid = await validateTelegramInitData(tg.initData, BOT_TOKEN);
                if (!isValid) {
                    document.body.innerHTML = `<div style="padding:50px 20px;text-align:center;color:#ef4444;font-size:18px;line-height:1.5;">Ошибка авторизации.<br><br>Приложение работает только через бота @iqwallet_bot.</div>`;
                    return;
                }
                if (tg.initDataUnsafe?.user) {
                    const user = tg.initDataUnsafe.user;
                    TELEGRAM_USER_ID = user.id.toString();
                    document.getElementById('user-name').textContent = user.first_name || 'Пользователь';
                    const avatarContainer = document.getElementById('header-avatar-container');
                    if (user.photo_url) avatarContainer.innerHTML = `<img src="${user.photo_url}" class="user-avatar" alt="Аватар">`;
                }
                tg.onEvent('themeChanged', applyTelegramTheme);
            } else {
                document.getElementById('user-name').textContent = 'Демо пользователь';
            }

            loadData();
            await loadRates();
            await renderBalance();
            renderRecentHistory();
            applyTelegramTheme();
            switchPage(1);
            populateConverterSelects();
        }

        window.onload = initApp;
    </script>
</body>
</html>
