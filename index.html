<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phantom Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
    </style>
</head>
<body class="bg-zinc-950 text-white">

<div class="max-w-md mx-auto h-screen bg-zinc-950 flex flex-col">

    <!-- Верхняя панель -->
    <div class="px-6 pt-12 pb-6 bg-gradient-to-b from-zinc-900 to-transparent flex items-center gap-3 border-b border-zinc-800">
        <div id="avatar" class="w-12 h-12 rounded-2xl overflow-hidden flex-shrink-0"></div>
        <div>
            <div id="first_name" class="font-semibold text-xl"></div>
            <div id="username" class="text-sm text-zinc-400"></div>
        </div>
    </div>

    <!-- Основное пространство -->
    <div class="flex-1 flex items-center justify-center px-6">
        <p class="text-zinc-400 text-center">Главный экран скоро появится...</p>
    </div>

</div>

<script>
    function initApp() {
        const tg = window.Telegram?.WebApp;
        
        if (tg) {
            tg.ready();
            
            // Максимально агрессивно пытаемся открыть на весь экран
            tg.expand();
            setTimeout(() => tg.expand(), 300);
            setTimeout(() => tg.expand(), 800);

            const user = tg.initDataUnsafe?.user || {};

            // Аватарка
            const avatarEl = document.getElementById('avatar');
            if (user.photo_url) {
                avatarEl.innerHTML = `<img src="${user.photo_url}" class="w-full h-full object-cover">`;
            } else {
                avatarEl.innerHTML = `<div class="w-full h-full bg-gradient-to-br from-violet-500 to-cyan-400 flex items-center justify-center text-3xl">👤</div>`;
            }

            // Имя и юзернейм
            document.getElementById('first_name').textContent = user.first_name || 'Пользователь';
            document.getElementById('username').textContent = user.username ? '@' + user.username : '';
        } else {
            // Для теста в браузере
            document.getElementById('first_name').textContent = 'Тестовый пользователь';
            document.getElementById('avatar').innerHTML = `<div class="w-full h-full bg-gradient-to-br from-violet-500 to-cyan-400 flex items-center justify-center text-3xl">👤</div>`;
        }
    }

    window.onload = initApp;
</script>
</body>
</html>
