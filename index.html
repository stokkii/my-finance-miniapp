<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phantom Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); }
        .balance { font-size: 3rem; line-height: 1; letter-spacing: -2.5px; }
    </style>
</head>
<body class="bg-zinc-950 text-white">

<div class="max-w-md mx-auto min-h-screen bg-zinc-950 flex flex-col">

    <!-- Главный экран при запуске -->
    <div class="px-6 pt-12 pb-8 bg-gradient-to-b from-zinc-900 to-zinc-950">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="avatar" class="w-11 h-11 rounded-2xl flex items-center justify-center text-3xl"></div>
                <div id="username" class="font-semibold text-xl"></div>
            </div>
        </div>

        <div class="text-center mt-8">
            <div id="balance" class="balance font-bold text-white"></div>
            <div id="change" class="mt-2 text-xl font-medium"></div>
        </div>

        <!-- Кнопки как в TON Wallet -->
        <div class="grid grid-cols-3 gap-3 mt-10">
            <button onclick="showAddModal('income')" class="bg-emerald-600 hover:bg-emerald-700 py-4 rounded-3xl font-medium flex flex-col items-center gap-1 shadow-lg active:scale-95 transition">
                💰<span class="text-sm">Пополнить</span>
            </button>
            <button onclick="showAddModal('expense')" class="bg-red-600 hover:bg-red-700 py-4 rounded-3xl font-medium flex flex-col items-center gap-1 shadow-lg active:scale-95 transition">
                🛒<span class="text-sm">Потратить</span>
            </button>
            <button onclick="switchPage('converter')" class="bg-violet-600 hover:bg-violet-700 py-4 rounded-3xl font-medium flex flex-col items-center gap-1 shadow-lg active:scale-95 transition">
                🔄<span class="text-sm">Конвертер</span>
            </button>
        </div>
    </div>

    <div id="content" class="flex-1 px-5 pt-4 pb-24 overflow-y-auto"></div>

    <!-- Bottom nav -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 max-w-md w-full bg-zinc-900 border-t border-zinc-700 flex justify-around py-3 text-xs z-50">
        <div onclick="switchPage('dashboard')" class="flex-1 flex flex-col items-center text-emerald-400">🏠<br><span class="mt-1">Главная</span></div>
        <div onclick="switchPage('transactions')" class="flex-1 flex flex-col items-center text-zinc-400">📋<br><span class="mt-1">Операции</span></div>
        <div onclick="switchPage('categories')" class="flex-1 flex flex-col items-center text-zinc-400">📂<br><span class="mt-1">Категории</span></div>
        <div onclick="switchPage('converter')" class="flex-1 flex flex-col items-center text-zinc-400">🔄<br><span class="mt-1">Конвертер</span></div>
        <div onclick="switchPage('settings')" class="flex-1 flex flex-col items-center text-zinc-400">⚙️<br><span class="mt-1">Настройки</span></div>
    </div>
</div>

<!-- Modal -->
<div id="add-modal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-end">
    <div class="glass w-full rounded-t-3xl p-6"></div>
</div>

</body>
</html>
