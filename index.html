<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phantom Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div class="max-w-md mx-auto min-h-screen bg-zinc-950 flex flex-col">

    <!-- Верхняя панель с аватаркой и юзернеймом -->
    <div class="px-6 pt-10 pb-6 bg-gradient-to-b from-zinc-900 to-transparent flex items-center gap-3">
        <div id="avatar" class="w-11 h-11 rounded-2xl overflow-hidden"></div>
        <div>
            <div id="username" class="font-semibold text-xl"></div>
            <div class="text-xs text-zinc-400">Wallet</div>
        </div>
    </div>

    <!-- Остальное содержимое будет здесь -->
    <div id="content" class="flex-1 px-5 pt-8">
        <p class="text-center text-zinc-400 mt-20">Главный экран скоро появится...</p>
    </div>

</div>

<script>
    function initApp() {
        const tg = window.Telegram?.WebApp;
        
        if (tg) {
            tg.ready();
            tg.expand();           // Открывает на весь экран
            tg.MainButton.hide();  // скрываем стандартную кнопку, если есть

            const user = tg.initDataUnsafe?.user || {};

            // Аватарка
            const avatarEl = document.getElementById('avatar');
            if (user.photo_url) {
                avatarEl.innerHTML = `<img src="${user.photo_url}" class="w-full h-full object-cover">`;
            } else {
                avatarEl.innerHTML = `<div class="w-full h-full bg-gradient-to-br from-violet-500 to-cyan-400 flex items-center justify-center text-3xl">👤</div>`;
            }

            // Имя пользователя
            document.getElementById('username').textContent = user.first_name || 'Пользователь';
        }
    }

    window.onload = initApp;
</script>
</body>
</html>
