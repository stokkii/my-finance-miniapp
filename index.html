<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Финансы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body, html { 
            font-family: 'Inter', system-ui, sans-serif; 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">

<div class="h-screen w-full bg-zinc-950 flex flex-col">

    <!-- Верхняя панель -->
    <div class="px-6 pt-12 pb-6 bg-zinc-900 flex items-center gap-3 border-b border-zinc-800">
        <div id="avatar" class="w-12 h-12 rounded-2xl overflow-hidden flex-shrink-0"></div>
        <div>
            <div id="first_name" class="font-semibold text-2xl">Загрузка...</div>
            <div id="username" class="text-sm text-zinc-400"></div>
        </div>
    </div>

    <!-- Основная область -->
    <div class="flex-1 flex items-center justify-center p-6">
        <div class="text-center">
            <p class="text-zinc-400 text-lg">Главный экран</p>
            <p class="text-zinc-500 text-sm mt-2">Скоро здесь будет баланс и кнопки</p>
        </div>
    </div>

</div>

<script>
    function init() {
        const tg = window.Telegram?.WebApp;
        
        if (tg) {
            tg.ready();
            tg.expand();
            
            // Дополнительные попытки открыть на весь экран
            setTimeout(() => tg.expand(), 200);
            setTimeout(() => tg.expand(), 600);

            const user = tg.initDataUnsafe?.user || {};

            // Аватарка
            const avatar = document.getElementById('avatar');
            if (user.photo_url) {
                avatar.innerHTML = `<img src="${user.photo_url}" class="w-full h-full object-cover">`;
            } else {
                avatar.innerHTML = '👤';
            }

            // Имя
            document.getElementById('first_name').textContent = user.first_name || 'Пользователь';
            document.getElementById('username').textContent = user.username ? '@' + user.username : '';
        } else {
            // Если открыто не через Telegram
            document.getElementById('first_name').textContent = 'Тестовый пользователь';
            document.getElementById('avatar').innerHTML = '👤';
        }
    }

    window.onload = init;
</script>
</body>
</html>
