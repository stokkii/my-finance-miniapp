<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phantom Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .balance { font-size: 3.2rem; line-height: 1; }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-md mx-auto min-h-screen bg-zinc-950 flex flex-col">

        <!-- Header -->
        <div class="px-6 pt-10 pb-6 bg-gradient-to-b from-zinc-900 to-transparent">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-gradient-to-br from-purple-500 to-cyan-400 rounded-2xl flex items-center justify-center text-2xl">👻</div>
                    <div>
                        <h1 class="text-2xl font-bold">Phantom Finance</h1>
                        <p class="text-zinc-400 text-sm">Твой кошелёк</p>
                    </div>
                </div>
                <div id="user-info" class="text-right"></div>
            </div>
        </div>

        <div id="content" class="flex-1 px-5 pb-24 overflow-y-auto">

            <!-- Главная страница будет здесь -->

        </div>

        <!-- Bottom Nav -->
        <div class="fixed bottom-0 left-1/2 -translate-x-1/2 max-w-md w-full bg-zinc-900 border-t border-zinc-700 flex justify-around py-3 text-xs">
            <div onclick="switchPage('dashboard')" class="flex-1 flex flex-col items-center text-cyan-400">🏠<br><span>Главная</span></div>
            <div onclick="switchPage('transactions')" class="flex-1 flex flex-col items-center text-zinc-400">📋<br><span>Операции</span></div>
            <div onclick="switchPage('categories')" class="flex-1 flex flex-col items-center text-zinc-400">📂<br><span>Категории</span></div>
            <div onclick="switchPage('converter')" class="flex-1 flex flex-col items-center text-zinc-400">🔄<br><span>Конвертер</span></div>
            <div onclick="switchPage('settings')" class="flex-1 flex flex-col items-center text-zinc-400">⚙️<br><span>Настройки</span></div>
        </div>
    </div>

    <!-- Add Modal -->
    <div id="add-modal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-end"></div>

    <script>
        let transactions = [];
        let categories = ["Еда","Транспорт","Жильё","Зарплата","Фриланс","Развлечения","Здоровье","Одежда","Другое"];
        let baseCurrency = 'RUB';
        let rates = {};
        const currencies = ['RUB','USD','EUR','GBP','CNY','JPY','TRY','CZK','UAH'];
        const symbols = {RUB:'₽',USD:'$',EUR:'€',GBP:'£',CNY:'¥',JPY:'¥',TRY:'₺',CZK:'Kč',UAH:'₴'};
        let currentPage = 'dashboard';
        let chartInstance = null;

        function loadData() {
            const key = 'phantom_finance';
            const saved = localStorage.getItem(key);
            if (saved) {
                const data = JSON.parse(saved);
                transactions = data.transactions || [];
                categories = data.categories || categories;
                baseCurrency = data.baseCurrency || 'RUB';
            } else {
                saveData();
            }
        }

        function saveData() {
            const key = 'phantom_finance';
            localStorage.setItem(key, JSON.stringify({transactions, categories, baseCurrency}));
        }

        async function loadRates() {
            if (Object.keys(rates).length) return;
            try {
                const res = await fetch(`https://api.frankfurter.app/latest?from=${baseCurrency}`);
                const data = await res.json();
                rates = data.rates || {};
                rates[baseCurrency] = 1;
            } catch(e) {
                rates = {RUB:1, USD:0.0108, EUR:0.0099, CZK:0.24, UAH:0.42};
                rates[baseCurrency] = 1;
            }
        }

        function getAmountInBase(amount, curr) {
            return curr === baseCurrency ? amount : (amount / (rates[curr] || 1));
        }

        function calculateTotals() {
            let total = 0, income = 0, expense = 0;
            transactions.forEach(tx => {
                const base = getAmountInBase(tx.amount, tx.currency);
                if (tx.type === 'income') { income += base; total += base; }
                else { expense += base; total -= base; }
            });
            return {total, income, expense};
        }

        function renderDashboard() {
            const {total, income, expense} = calculateTotals();
            const change = income - expense;
            const changePercent = total > 0 ? ((change / (total - change)) * 100).toFixed(1) : 0;

            let html = `
                <div class="space-y-8">
                    <!-- Balance -->
                    <div class="text-center pt-4">
                        <p class="text-zinc-400 text-lg">Твой баланс</p>
                        <p class="balance font-bold text-white mt-2">${total.toFixed(0)} ${symbols[baseCurrency]}</p>
                        <p class="mt-3 ${change >= 0 ? 'text-emerald-400' : 'text-red-400'} font-medium">
                            ${change >= 0 ? '+' : ''}${change.toFixed(0)} ${symbols[baseCurrency]} 
                            <span class="text-sm">(${change >= 0 ? '+' : ''}${changePercent}%)</span>
                        </p>
                    </div>

                    <!-- Action Buttons -->
                    <div class="flex gap-4 px-4">
                        <button onclick="showAddModal('income')" class="flex-1 bg-emerald-500 hover:bg-emerald-600 py-5 rounded-3xl font-semibold text-xl shadow-lg">💰 Доход</button>
                        <button onclick="showAddModal('expense')" class="flex-1 bg-red-500 hover:bg-red-600 py-5 rounded-3xl font-semibold text-xl shadow-lg">🛒 Расход</button>
                    </div>

                    <!-- Chart -->
                    <div class="bg-zinc-900 rounded-3xl p-6 mx-2">
                        <h2 class="font-semibold mb-4">Динамика за период</h2>
                        <canvas id="main-chart" height="180"></canvas>
                    </div>

                    <!-- Recent -->
                    <div class="px-2">
                        <div class="flex justify-between mb-4 px-2">
                            <h2 class="font-semibold text-lg">Последние операции</h2>
                            <span onclick="switchPage('transactions')" class="text-cyan-400 cursor-pointer">Все →</span>
                        </div>
                        <div id="recent" class="space-y-3"></div>
                    </div>
                </div>
            `;

            document.getElementById('content').innerHTML = html;

            // Recent list
            const recentHTML = document.getElementById('recent');
            const recentTx = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0,5);
            let str = '';
            recentTx.forEach(tx => {
                const baseAmt = getAmountInBase(tx.amount, tx.currency);
                str += `
                <div class="bg-zinc-900 rounded-2xl p-4 flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <span class="text-3xl">${tx.type==='income' ? '💰' : '🛒'}</span>
                        <div>
                            <div class="font-medium">${tx.category}</div>
                            <div class="text-xs text-zinc-400">${tx.date}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="${tx.type==='income' ? 'text-emerald-400' : 'text-red-400'} font-semibold">
                            ${tx.type==='income' ? '+' : '-'}${baseAmt.toFixed(0)} ${symbols[baseCurrency]}
                        </div>
                    </div>
                </div>`;
            });
            recentHTML.innerHTML = str || '<p class="text-center text-zinc-400 py-8">Пока нет операций</p>';

            updateNavActive();
        }

        function switchPage(page) {
            currentPage = page;
            if (page === 'dashboard') renderDashboard();
            else if (page === 'transactions') renderTransactions();
            else if (page === 'categories') renderCategories();
            else if (page === 'converter') renderConverter();
            else if (page === 'settings') renderSettings();
        }

        function updateNavActive() {
            // Простая подсветка активной вкладки (можно улучшить позже)
            console.log('Переключились на', currentPage);
        }

        // Простые заглушки для остальных страниц (чтобы не падало)
        function renderTransactions() { document.getElementById('content').innerHTML = `<div class="p-8 text-center text-zinc-400">Страница всех операций<br><br>Скоро будет доработана</div>`; }
        function renderCategories() { document.getElementById('content').innerHTML = `<div class="p-8 text-center text-zinc-400">Категории<br><br>Скоро</div>`; }
        function renderConverter() { document.getElementById('content').innerHTML = `<div class="p-8 text-center text-zinc-400">Конвертер валют<br><br>Скоро</div>`; }
        function renderSettings() { document.getElementById('content').innerHTML = `<div class="p-8 text-center text-zinc-400">Настройки<br><br>Скоро</div>`; }

        function showAddModal(type) {
            // Здесь можно вставить модалку позже, пока используем alert для теста
            const amount = prompt(type === 'income' ? 'Сумма дохода:' : 'Сумма расхода:');
            if (!amount) return;
            const category = prompt('Категория:') || 'Другое';
            transactions.unshift({
                id: Date.now(),
                date: new Date().toISOString().slice(0,10),
                type,
                amount: parseFloat(amount),
                currency: baseCurrency,
                category
            });
            saveData();
            renderDashboard();
        }

        async function initApp() {
            loadData();
            await loadRates();
            document.getElementById('user-info').innerHTML = `👋 ${baseCurrency}`;
            renderDashboard();
        }

        window.onload = initApp;
    </script>
</body>
</html>
