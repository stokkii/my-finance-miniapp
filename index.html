<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phantom Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div class="max-w-md mx-auto min-h-screen bg-zinc-950 flex flex-col">

    <!-- Верхняя панель -->
    <div class="px-6 pt-12 pb-6 bg-gradient-to-b from-zinc-900 to-transparent flex items-center gap-3">
        <div id="avatar" class="w-12 h-12 rounded-2xl overflow-hidden bg-zinc-800 flex items-center justify-center text-3xl"></div>
        <div>
            <div id="first_name" class="font-semibold text-xl">Загрузка...</div>
            <div id="username" class="text-sm text-zinc-400"></div>
        </div>
    </div>

    <div class="flex-1 flex items-center justify-center">
        <p class="text-zinc-400 text-center">Главный экран скоро появится...</p>
    </div>

</div>

<script>
    function initApp() {
        const tg = window.Telegram?.WebApp;
        
        if (tg) {
            tg.ready();
            tg.expand();           // Принудительно открываем на весь экран

            const user = tg.initDataUnsafe?.user || {};

            // Аватарка
            const avatarEl = document.getElementById('avatar');
            if (user.photo_url) {
                avatarEl.innerHTML = `<img src="${user.photo_url}" class="w-full h-full object-cover">`;
            } else {
                avatarEl.innerHTML = '👤';
            }

            // Имя
            document.getElementById('first_name').textContent = user.first_name || 'Пользователь';
            document.getElementById('username').textContent = user.username ? '@' + user.username : '';
        } else {
            // Если открыто не через Telegram (для теста)
            document.getElementById('first_name').textContent = 'Пользователь';
            document.getElementById('avatar').innerHTML = '👤';
        }
    }

    window.onload = initApp;
</script>
</body>
</html>
