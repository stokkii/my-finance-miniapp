<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phantom Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); }
        .balance { font-size: 2.95rem; line-height: 1; letter-spacing: -2px; }
        .modal { animation: modalUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-zinc-950 text-white">

<div class="max-w-md mx-auto min-h-screen bg-zinc-950 flex flex-col">

    <!-- HEADER ТОЛЬКО НА ГЛАВНОЙ -->
    <div id="main-header" class="px-6 pt-10 pb-6 bg-gradient-to-b from-zinc-900 to-transparent">
        <div class="flex items-center justify-between">
            <div id="user-header" class="flex items-center gap-3"></div>
        </div>

        <div class="text-center mt-8">
            <div id="balance-display" class="balance font-bold"></div>
            <div id="change-display" class="mt-3 text-xl font-medium flex items-center justify-center gap-2"></div>
        </div>

        <div class="grid grid-cols-3 gap-3 mt-10">
            <button onclick="showAddModal('income')" class="bg-gradient-to-r from-emerald-500 to-teal-500 py-4 rounded-3xl font-semibold shadow-lg active:scale-95 transition">💰 Пополнить</button>
            <button onclick="showAddModal('expense')" class="bg-gradient-to-r from-red-500 to-rose-500 py-4 rounded-3xl font-semibold shadow-lg active:scale-95 transition">🛒 Потратить</button>
            <button onclick="switchPage('converter')" class="bg-gradient-to-r from-violet-500 to-purple-500 py-4 rounded-3xl font-semibold shadow-lg active:scale-95 transition">🔄 Конвертер</button>
        </div>
    </div>

    <div id="content" class="flex-1 px-5 pt-2 pb-24 overflow-y-auto"></div>

    <!-- Bottom nav -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 max-w-md w-full bg-zinc-900 border-t border-zinc-700 flex justify-around py-3 text-xs z-50">
        <div onclick="switchPage('dashboard')" class="flex-1 flex flex-col items-center text-emerald-400">🏠<br><span class="mt-1">Главная</span></div>
        <div onclick="switchPage('transactions')" class="flex-1 flex flex-col items-center text-zinc-400">📋<br><span class="mt-1">Операции</span></div>
        <div onclick="switchPage('categories')" class="flex-1 flex flex-col items-center text-zinc-400">📂<br><span class="mt-1">Категории</span></div>
        <div onclick="switchPage('converter')" class="flex-1 flex flex-col items-center text-zinc-400">🔄<br><span class="mt-1">Конвертер</span></div>
        <div onclick="switchPage('settings')" class="flex-1 flex flex-col items-center text-zinc-400">⚙️<br><span class="mt-1">Настройки</span></div>
    </div>
</div>

<!-- Modal -->
<div id="add-modal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-end">
    <div class="modal glass w-full rounded-t-3xl p-6"></div>
</div>

<script>
    let transactions = [];
    let categories = ["Еда","Транспорт","Жильё","Зарплата","Фриланс","Развлечения","Здоровье","Одежда","Другое"];
    let baseCurrency = 'RUB';
    let rates = {};
    const currencies = ['RUB', 'UAH', 'USD', 'EUR', 'CZK'];
    const symbols = {RUB:'₽', UAH:'₴', USD:'$', EUR:'€', CZK:'Kč'};
    let currentPage = 'dashboard';
    let chartInstance = null;

    function loadData() {
        const tg = window.Telegram?.WebApp || {};
        const userId = tg.initDataUnsafe?.user?.id || 'demo';
        const key = `phantom_finance_${userId}`;
        const saved = localStorage.getItem(key);
        if (saved) {
            const data = JSON.parse(saved);
            transactions = data.transactions || [];
            categories = data.categories || categories;
            baseCurrency = data.baseCurrency || 'RUB';
        }
    }

    function saveData() {
        const tg = window.Telegram?.WebApp || {};
        const userId = tg.initDataUnsafe?.user?.id || 'demo';
        const key = `phantom_finance_${userId}`;
        localStorage.setItem(key, JSON.stringify({transactions, categories, baseCurrency}));
    }

    async function loadRates() {
        if (Object.keys(rates).length > 0) return;
        try {
            const res = await fetch(`https://api.frankfurter.app/latest?from=${baseCurrency}`);
            const data = await res.json();
            rates = data.rates || {};
            rates[baseCurrency] = 1;
        } catch(e) {
            rates = {RUB:1, UAH:0.42, USD:0.0108, EUR:0.0099, CZK:0.24};
            rates[baseCurrency] = 1;
        }
    }

    function getAmountInBase(amount, curr) {
        return curr === baseCurrency ? amount : amount / (rates[curr] || 1);
    }

    function calculateTotals() {
        let total = 0, income = 0, expense = 0;
        transactions.forEach(tx => {
            const base = getAmountInBase(tx.amount, tx.currency);
            if (tx.type === 'income') { income += base; total += base; }
            else { expense += base; total -= base; }
        });
        return {total, income, expense};
    }

    function getBalanceHistory() {
        const sorted = [...transactions].sort((a,b) => new Date(a.date) - new Date(b.date));
        let balance = 0;
        const history = [];
        const dateMap = {};
        sorted.forEach(tx => {
            const baseAmt = getAmountInBase(tx.amount, tx.currency);
            balance += tx.type === 'income' ? baseAmt : -baseAmt;
            dateMap[tx.date] = balance;
        });
        Object.keys(dateMap).sort().forEach(d => history.push({date:d, balance:dateMap[d]}));
        return history;
    }

    function renderDashboard() {
        const {total, income, expense} = calculateTotals();
        const change = income - expense;
        const changePercent = total > 0 ? ((change / total) * 100).toFixed(1) : 0;
        const history = getBalanceHistory();

        // Аватарка + имя
        const tg = window.Telegram?.WebApp || {};
        const user = tg.initDataUnsafe?.user || {};
        const avatar = user.photo_url 
            ? `<img src="${user.photo_url}" class="w-10 h-10 rounded-2xl">` 
            : `<div class="w-10 h-10 bg-gradient-to-br from-violet-400 to-cyan-400 rounded-2xl flex items-center justify-center text-2xl">👤</div>`;

        document.getElementById('user-header').innerHTML = `
            ${avatar}
            <div>
                <div class="font-semibold">${user.first_name || 'Пользователь'}</div>
                <div class="text-xs text-zinc-400">@${user.username || 'user'}</div>
            </div>
        `;

        document.getElementById('main-header').classList.remove('hidden');

        let html = `
            <div class="space-y-8">
                <div class="glass rounded-3xl p-6">
                    <h2 class="font-medium mb-4">Динамика баланса</h2>
                    <canvas id="balance-chart" height="190"></canvas>
                </div>

                <div>
                    <div class="flex justify-between mb-4 px-1">
                        <h2 class="font-semibold text-lg">Последние операции</h2>
                        <span onclick="switchPage('transactions')" class="text-violet-400 cursor-pointer">Все →</span>
                    </div>
                    <div id="recent-list" class="space-y-3"></div>
                </div>
            </div>
        `;

        document.getElementById('content').innerHTML = html;

        // Баланс
        document.getElementById('balance-display').innerHTML = `${total.toFixed(0)} <span class="text-3xl">${symbols[baseCurrency]}</span>`;
        const ch = document.getElementById('change-display');
        ch.innerHTML = `${change >= 0 ? '↑' : '↓'} ${Math.abs(change).toFixed(0)} ${symbols[baseCurrency]} <span class="text-sm">(${change >= 0 ? '+' : ''}${changePercent}%)</span>`;
        ch.className = change >= 0 ? "mt-3 text-emerald-400 text-xl font-medium flex items-center justify-center gap-2" : "mt-3 text-red-400 text-xl font-medium flex items-center justify-center gap-2";

        // Recent
        const recent = [...transactions].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
        let str = '';
        recent.forEach(tx => {
            const baseAmt = getAmountInBase(tx.amount, tx.currency);
            str += `
            <div class="glass rounded-3xl p-5 flex justify-between items-center">
                <div class="flex gap-4">
                    <span class="text-4xl">${tx.type==='income'?'💰':'🛒'}</span>
                    <div>
                        <div class="font-medium">${tx.category}</div>
                        <div class="text-xs text-zinc-400">${tx.date}</div>
                    </div>
                </div>
                <div class="text-right font-semibold ${tx.type==='income'?'text-emerald-400':'text-red-400'}">
                    ${tx.type==='income'?'+' : '-'}${baseAmt.toFixed(0)} ${symbols[baseCurrency]}
                </div>
            </div>`;
        });
        document.getElementById('recent-list').innerHTML = str || '<p class="text-center text-zinc-400 py-10">Нет операций</p>';

        // График
        if (chartInstance) chartInstance.destroy();
        const ctx = document.getElementById('balance-chart');
        if (history.length > 1) {
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => h.date),
                    datasets: [{ data: history.map(h => h.balance), borderColor: '#a5b4fc', borderWidth: 5, tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(165,180,252,0.15)' }]
                },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#27272a' } }, x: { grid: { color: '#27272a' } } } }
            });
        }
    }

    function renderTransactions() {
        let html = `<div class="px-2"><h2 class="text-2xl font-semibold mb-6">Все операции</h2><div id="tx-list" class="space-y-3"></div></div>`;
        document.getElementById('content').innerHTML = html;
        const container = document.getElementById('tx-list');
        const sorted = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date));
        let str = '';
        sorted.forEach(tx => {
            const base = getAmountInBase(tx.amount, tx.currency);
            str += `
            <div class="glass rounded-3xl p-5 flex justify-between items-center">
                <div>
                    <div class="font-medium">${tx.category}</div>
                    <div class="text-xs text-zinc-400">${tx.date}</div>
                </div>
                <div class="text-right">
                    <div class="${tx.type==='income'?'text-emerald-400':'text-red-400'} font-semibold">${tx.type==='income'?'+' : '-'}${base.toFixed(0)} ${symbols[baseCurrency]}</div>
                    <button onclick="deleteTransaction(${tx.id}); event.stopImmediatePropagation()" class="text-red-400 text-xs mt-3">Удалить</button>
                </div>
            </div>`;
        });
        container.innerHTML = str || '<p class="text-zinc-400 text-center py-12">Пока пусто</p>';
    }

    function renderCategories() {
        let html = `<div class="px-2"><div class="flex justify-between mb-6"><h2 class="text-2xl font-semibold">Категории</h2><button onclick="addNewCategory()" class="bg-violet-600 px-6 py-3 rounded-3xl text-sm">+ Добавить</button></div><div id="cat-grid" class="grid grid-cols-2 gap-3"></div></div>`;
        document.getElementById('content').innerHTML = html;
        const grid = document.getElementById('cat-grid');
        let str = '';
        categories.forEach(cat => str += `<div class="glass rounded-3xl px-6 py-5 flex justify-between"><span>${cat}</span><button onclick="deleteCategory('${cat}')" class="text-red-400">✕</button></div>`);
        grid.innerHTML = str;
    }

    function renderConverter() {
        let html = `<div class="px-2"><h2 class="text-2xl font-semibold mb-6">Конвертер валют</h2><div class="glass rounded-3xl p-6"><div class="flex items-center gap-4 mb-8"><select id="from-curr" onchange="updateConverter()" class="flex-1 bg-white/10 py-4 px-5 rounded-2xl text-lg">${currencies.map(c => `<option value="${c}">${c} ${symbols[c]}</option>`).join('')}</select><button onclick="swapCurrencies()" class="text-4xl text-violet-400">⇄</button><select id="to-curr" onchange="updateConverter()" class="flex-1 bg-white/10 py-4 px-5 rounded-2xl text-lg">${currencies.map(c => `<option value="${c}">${c} ${symbols[c]}</option>`).join('')}</select></div><input id="conv-amount" type="number" value="100" oninput="updateConverter()" class="w-full bg-transparent text-4xl text-center outline-none font-medium"><div id="conv-result" class="mt-8 text-center text-5xl font-semibold text-emerald-400"></div></div></div>`;
        document.getElementById('content').innerHTML = html;
        setTimeout(updateConverter, 100);
    }

    function updateConverter() {
        const from = document.getElementById('from-curr').value;
        const to = document.getElementById('to-curr').value;
        const amt = parseFloat(document.getElementById('conv-amount').value) || 0;
        if (!rates[from] || !rates[to]) return;
        const result = amt * (rates[to] / rates[from]);
        document.getElementById('conv-result').innerHTML = `${result.toFixed(2)} ${symbols[to]}`;
    }

    function swapCurrencies() {
        const f = document.getElementById('from-curr');
        const t = document.getElementById('to-curr');
        const temp = f.value; f.value = t.value; t.value = temp;
        updateConverter();
    }

    function renderSettings() {
        let html = `<div class="px-2"><h2 class="text-2xl font-semibold mb-6">Настройки</h2><div class="glass rounded-3xl p-6"><p class="text-zinc-400 mb-3 text-sm">Базовая валюта</p><select id="base-select" onchange="changeBaseCurrency(this.value)" class="w-full py-5 px-6 bg-white/10 rounded-2xl text-xl">${currencies.map(c => `<option value="${c}" ${c===baseCurrency?'selected':''}>${c} ${symbols[c]}</option>`).join('')}</select></div></div>`;
        document.getElementById('content').innerHTML = html;
    }

    function changeBaseCurrency(val) {
        baseCurrency = val;
        rates = {};
        loadRates().then(() => { saveData(); renderDashboard(); });
    }

    function showAddModal(type) {
        const title = type === 'income' ? '💰 Пополнить' : '🛒 Потратить';
        const modalHTML = `<div class="modal glass w-full rounded-t-3xl p-6"><h3 class="text-2xl font-semibold mb-6">${title}</h3><form onsubmit="addTransaction(event, '${type}')" class="space-y-6"><input id="add-amount" type="number" step="0.01" placeholder="Сумма" required class="w-full py-6 px-6 bg-white/10 rounded-2xl text-4xl text-center outline-none"><select id="add-category" class="w-full py-6 px-6 bg-white/10 rounded-2xl text-lg">${categories.map(c => `<option>${c}</option>`).join('')}</select><input id="add-desc" type="text" placeholder="Описание" class="w-full py-6 px-6 bg-white/10 rounded-2xl text-lg"><button type="submit" class="w-full py-6 bg-gradient-to-r from-violet-500 to-fuchsia-500 rounded-3xl text-xl font-semibold">Сохранить</button></form></div>`;
        const modal = document.getElementById('add-modal');
        modal.querySelector('div').innerHTML = modalHTML;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function hideAddModal() {
        const modal = document.getElementById('add-modal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function addTransaction(e, type) {
        e.preventDefault();
        const amount = parseFloat(document.getElementById('add-amount').value);
        if (!amount) return;
        const category = document.getElementById('add-category').value;
        const desc = document.getElementById('add-desc').value || '';
        transactions.unshift({id:Date.now(), date:new Date().toISOString().slice(0,10), type, amount, currency:baseCurrency, category, desc});
        saveData();
        hideAddModal();
        renderDashboard();
    }

    function deleteTransaction(id) {
        if (confirm('Удалить операцию?')) {
            transactions = transactions.filter(t => t.id !== id);
            saveData();
            renderTransactions();
        }
    }

    function addNewCategory() {
        const name = prompt('Название новой категории:');
        if (name && name.trim()) {
            categories.push(name.trim());
            saveData();
            renderCategories();
        }
    }

    function deleteCategory(cat) {
        if (confirm(`Удалить «${cat}»?`)) {
            categories = categories.filter(c => c !== cat);
            saveData();
            renderCategories();
        }
    }

    function switchPage(page) {
        currentPage = page;
        document.getElementById('main-header').classList.toggle('hidden', page !== 'dashboard');
        if (page === 'dashboard') renderDashboard();
        else if (page === 'transactions') renderTransactions();
        else if (page === 'categories') renderCategories();
        else if (page === 'converter') renderConverter();
        else if (page === 'settings') renderSettings();
    }

    async function initApp() {
        const tg = window.Telegram?.WebApp || {};
        tg.ready();
        tg.expand();
        loadData();
        await loadRates();
        renderDashboard();   // ← Главный экран сразу
    }

    window.onload = initApp;
</script>
</body>
</html>
