<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phantom Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.07); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .balance { font-size: 2.8rem; line-height: 1; letter-spacing: -1.5px; }
        .modal-content { animation: modalUp 0.4s ease-out; }
        @keyframes modalUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="bg-zinc-950 text-white">

<div class="max-w-md mx-auto min-h-screen bg-zinc-950 flex flex-col">

    <!-- HEADER + BALANCE -->
    <div class="px-6 pt-10 pb-6 bg-gradient-to-b from-zinc-900 to-transparent">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-violet-500 to-cyan-400 rounded-2xl flex items-center justify-center text-3xl shadow">👻</div>
                <div class="font-semibold text-xl">Wallet 1</div>
            </div>
            <div id="user-info" class="text-sm text-zinc-400"></div>
        </div>

        <div class="text-center mt-8">
            <div id="balance-display" class="balance font-bold text-white"></div>
            <div id="change-display" class="mt-2 text-lg font-medium flex items-center justify-center gap-2"></div>
        </div>

        <!-- Action buttons - компактные и стильные -->
        <div class="grid grid-cols-3 gap-3 mt-10">
            <button onclick="showAddModal('income')" class="bg-gradient-to-r from-emerald-500 to-teal-500 py-4 rounded-3xl font-semibold text-base shadow-lg active:scale-95 transition">💰 Пополнить</button>
            <button onclick="showAddModal('expense')" class="bg-gradient-to-r from-red-500 to-rose-500 py-4 rounded-3xl font-semibold text-base shadow-lg active:scale-95 transition">🛒 Потратить</button>
            <button onclick="switchPage('converter')" class="bg-gradient-to-r from-purple-500 to-violet-500 py-4 rounded-3xl font-semibold text-base shadow-lg active:scale-95 transition">🔄 Конвертер</button>
        </div>
    </div>

    <div id="content" class="flex-1 px-5 pt-4 pb-24 overflow-y-auto"></div>

    <!-- Bottom Navigation - чистая и удобная -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 max-w-md w-full bg-zinc-900 border-t border-zinc-700 flex justify-around py-4 text-xs z-50">
        <div onclick="switchPage('dashboard')" class="flex-1 flex flex-col items-center text-emerald-400">🏠<br><span class="mt-1">Главная</span></div>
        <div onclick="switchPage('transactions')" class="flex-1 flex flex-col items-center text-zinc-400">📋<br><span class="mt-1">Операции</span></div>
        <div onclick="switchPage('categories')" class="flex-1 flex flex-col items-center text-zinc-400">📂<br><span class="mt-1">Категории</span></div>
        <div onclick="switchPage('converter')" class="flex-1 flex flex-col items-center text-zinc-400">🔄<br><span class="mt-1">Конвертер</span></div>
        <div onclick="switchPage('settings')" class="flex-1 flex flex-col items-center text-zinc-400">⚙️<br><span class="mt-1">Настройки</span></div>
    </div>
</div>

<!-- Modal -->
<div id="add-modal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-end">
    <div class="modal-content glass w-full rounded-t-3xl p-6"></div>
</div>

<script>
    let transactions = [];
    let categories = ["Еда","Транспорт","Жильё","Зарплата","Фриланс","Развлечения","Здоровье","Одежда","Другое"];
    let baseCurrency = 'RUB';
    let rates = {};
    const currencies = ['RUB','USD','EUR','GBP','CNY','JPY','TRY','CZK','UAH'];
    const symbols = {RUB:'₽',USD:'$',EUR:'€',GBP:'£',CNY:'¥',JPY:'¥',TRY:'₺',CZK:'Kč',UAH:'₴'};
    let currentPage = 'dashboard';
    let chartInstance = null;

    function loadData() {
        const tg = window.Telegram?.WebApp || {};
        const userId = tg.initDataUnsafe?.user?.id || 'demo';
        const key = `phantom_finance_${userId}`;
        const saved = localStorage.getItem(key);
        if (saved) {
            const data = JSON.parse(saved);
            transactions = data.transactions || [];
            categories = data.categories || categories;
            baseCurrency = data.baseCurrency || 'RUB';
        }
    }

    function saveData() {
        const tg = window.Telegram?.WebApp || {};
        const userId = tg.initDataUnsafe?.user?.id || 'demo';
        const key = `phantom_finance_${userId}`;
        localStorage.setItem(key, JSON.stringify({transactions, categories, baseCurrency}));
    }

    async function loadRates() {
        if (Object.keys(rates).length) return;
        try {
            const res = await fetch(`https://api.frankfurter.app/latest?from=${baseCurrency}`);
            const data = await res.json();
            rates = data.rates || {};
            rates[baseCurrency] = 1;
        } catch(e) {
            rates = {RUB:1, USD:0.0108, EUR:0.0099, CZK:0.24, UAH:0.42};
            rates[baseCurrency] = 1;
        }
    }

    function getAmountInBase(amount, curr) {
        return curr === baseCurrency ? amount : amount / (rates[curr] || 1);
    }

    function calculateTotals() {
        let total = 0, income = 0, expense = 0;
        transactions.forEach(tx => {
            const base = getAmountInBase(tx.amount, tx.currency);
            if (tx.type === 'income') { income += base; total += base; }
            else { expense += base; total -= base; }
        });
        return {total, income, expense};
    }

    function renderDashboard() {
        const {total, income, expense} = calculateTotals();
        const change = income - expense;
        const changePercent = total > 0 ? ((change / total) * 100).toFixed(1) : 0;

        let html = `
            <div class="space-y-8">
                <!-- Chart -->
                <div class="glass rounded-3xl p-5">
                    <h2 class="font-medium text-lg mb-4">Динамика баланса</h2>
                    <canvas id="balance-chart" height="160"></canvas>
                </div>

                <!-- Recent operations -->
                <div>
                    <div class="flex justify-between px-1 mb-4">
                        <h2 class="font-semibold text-lg">Последние операции</h2>
                        <span onclick="switchPage('transactions')" class="text-violet-400 cursor-pointer text-sm">Все →</span>
                    </div>
                    <div id="recent-list" class="space-y-3"></div>
                </div>
            </div>
        `;

        document.getElementById('content').innerHTML = html;

        // Update balance
        document.getElementById('balance-display').innerHTML = `${total.toFixed(0)} <span class="text-3xl font-normal">${symbols[baseCurrency]}</span>`;
        const changeEl = document.getElementById('change-display');
        changeEl.innerHTML = `${change >= 0 ? '↑' : '↓'} ${Math.abs(change).toFixed(0)} ${symbols[baseCurrency]} <span class="text-sm">(${change >= 0 ? '+' : ''}${changePercent}%)</span>`;
        changeEl.className = change >= 0 ? "mt-2 text-emerald-400 text-lg font-medium flex items-center justify-center gap-2" : "mt-2 text-red-400 text-lg font-medium flex items-center justify-center gap-2";

        // Recent
        const recent = [...transactions].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6);
        let str = '';
        recent.forEach(tx => {
            const baseAmt = getAmountInBase(tx.amount, tx.currency);
            str += `
            <div class="glass rounded-3xl p-5 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="text-4xl w-12">${tx.type === 'income' ? '💰' : '🛒'}</div>
                    <div>
                        <div class="font-medium">${tx.category}</div>
                        <div class="text-xs text-zinc-400">${tx.date} ${tx.desc ? '• ' + tx.desc : ''}</div>
                    </div>
                </div>
                <div class="text-right font-semibold ${tx.type === 'income' ? 'text-emerald-400' : 'text-red-400'}">
                    ${tx.type === 'income' ? '+' : '-'}${baseAmt.toFixed(0)} ${symbols[baseCurrency]}
                </div>
            </div>`;
        });
        document.getElementById('recent-list').innerHTML = str || `<p class="text-center text-zinc-400 py-12">Нет операций.<br>Нажми кнопку выше, чтобы добавить первую.</p>`;

        updateNavActive();
    }

    // Остальные страницы (компактные и красивые)
    function renderTransactions() {
        let html = `<div class="px-2"><h2 class="text-2xl font-semibold mb-6">Все операции</h2><div id="tx-list" class="space-y-3"></div></div>`;
        document.getElementById('content').innerHTML = html;
        const container = document.getElementById('tx-list');
        const sorted = [...transactions].sort((a,b) => new Date(b.date) - new Date(a.date));
        let str = '';
        sorted.forEach(tx => {
            const base = getAmountInBase(tx.amount, tx.currency);
            str += `
            <div class="glass rounded-3xl p-5 flex justify-between">
                <div>
                    <div class="font-medium">${tx.category}</div>
                    <div class="text-xs text-zinc-400">${tx.date}</div>
                </div>
                <div class="text-right">
                    <div class="${tx.type==='income'?'text-emerald-400':'text-red-400'} font-semibold">${tx.type==='income'?'+' : '-'}${base.toFixed(0)} ${symbols[baseCurrency]}</div>
                    <button onclick="deleteTransaction(${tx.id}); event.stopImmediatePropagation()" class="text-red-400 text-xs mt-3">Удалить</button>
                </div>
            </div>`;
        });
        container.innerHTML = str || '<p class="text-zinc-400 text-center py-12">Пока пусто</p>';
        updateNavActive();
    }

    function renderCategories() {
        let html = `
            <div class="px-2">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold">Категории</h2>
                    <button onclick="addNewCategory()" class="bg-violet-600 px-5 py-2.5 rounded-2xl text-sm">+ Новая</button>
                </div>
                <div id="cat-list" class="grid grid-cols-2 gap-3"></div>
            </div>`;
        document.getElementById('content').innerHTML = html;
        const grid = document.getElementById('cat-list');
        let str = '';
        categories.forEach(cat => {
            str += `<div class="glass rounded-3xl px-6 py-5 flex justify-between items-center"><span class="font-medium">${cat}</span><button onclick="deleteCategory('${cat}')" class="text-red-400 text-xl">✕</button></div>`;
        });
        grid.innerHTML = str;
        updateNavActive();
    }

    function renderConverter() {
        let html = `
            <div class="px-2">
                <h2 class="text-2xl font-semibold mb-6">Конвертер валют</h2>
                <div class="glass rounded-3xl p-6">
                    <div class="flex gap-4 mb-6">
                        <select id="from-curr" onchange="updateConverter()" class="flex-1 bg-white/10 py-4 px-5 rounded-2xl text-lg">${currencies.map(c => `<option value="${c}">${c} ${symbols[c]}</option>`).join('')}</select>
                        <button onclick="swapCurrencies()" class="text-3xl px-4">⇄</button>
                        <select id="to-curr" onchange="updateConverter()" class="flex-1 bg-white/10 py-4 px-5 rounded-2xl text-lg">${currencies.map(c => `<option value="${c}">${c} ${symbols[c]}</option>`).join('')}</select>
                    </div>
                    <input id="conv-amount" type="number" value="100" oninput="updateConverter()" class="w-full bg-transparent text-5xl text-center outline-none font-medium">
                    <div id="conv-result" class="text-center mt-10 text-4xl font-semibold text-emerald-400"></div>
                </div>
            </div>`;
        document.getElementById('content').innerHTML = html;
        setTimeout(updateConverter, 100);
        updateNavActive();
    }

    function updateConverter() {
        const from = document.getElementById('from-curr').value;
        const to = document.getElementById('to-curr').value;
        const amt = parseFloat(document.getElementById('conv-amount').value) || 0;
        if (!rates[from] || !rates[to]) return;
        const result = (amt / rates[from]) * rates[to];
        document.getElementById('conv-result').innerHTML = `${result.toFixed(2)} ${symbols[to]}`;
    }

    function swapCurrencies() {
        const f = document.getElementById('from-curr');
        const t = document.getElementById('to-curr');
        const temp = f.value; f.value = t.value; t.value = temp;
        updateConverter();
    }

    function renderSettings() {
        let html = `
            <div class="px-2">
                <h2 class="text-2xl font-semibold mb-6">Настройки</h2>
                <div class="glass rounded-3xl p-6">
                    <p class="text-sm text-zinc-400 mb-3">Базовая валюта</p>
                    <select id="base-select" onchange="changeBaseCurrency(this.value)" class="w-full py-5 px-6 bg-white/10 rounded-2xl text-xl">${currencies.map(c => `<option value="${c}" ${c===baseCurrency?'selected':''}>${c} ${symbols[c]}</option>`).join('')}</select>
                </div>
                <button onclick="clearAllData()" class="mt-10 w-full py-5 bg-red-600 rounded-3xl text-lg font-medium">Очистить все данные</button>
            </div>`;
        document.getElementById('content').innerHTML = html;
        updateNavActive();
    }

    function changeBaseCurrency(val) {
        baseCurrency = val;
        rates = {};
        loadRates().then(() => { saveData(); renderDashboard(); });
    }

    function showAddModal(type) {
        const title = type === 'income' ? '💰 Пополнить' : '🛒 Потратить';
        const modalHTML = `
        <div class="modal-content glass w-full rounded-t-3xl p-6">
            <h3 class="text-2xl font-semibold mb-6">${title}</h3>
            <form onsubmit="addTransaction(event, '${type}')" class="space-y-5">
                <input id="add-amount" type="number" step="0.01" placeholder="0.00" class="w-full py-5 px-6 bg-white/10 rounded-2xl text-4xl text-center outline-none" required>
                <select id="add-category" class="w-full py-5 px-6 bg-white/10 rounded-2xl text-lg">${categories.map(cat => `<option>${cat}</option>`).join('')}</select>
                <input id="add-desc" type="text" placeholder="Описание (необязательно)" class="w-full py-5 px-6 bg-white/10 rounded-2xl text-lg">
                <button type="submit" class="w-full py-6 bg-gradient-to-r from-violet-500 to-fuchsia-500 rounded-3xl text-xl font-semibold">Сохранить операцию</button>
            </form>
        </div>`;
        const modal = document.getElementById('add-modal');
        modal.querySelector('.modal-content').innerHTML = modalHTML;
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function hideAddModal() {
        const modal = document.getElementById('add-modal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function addTransaction(e, type) {
        e.preventDefault();
        const amount = parseFloat(document.getElementById('add-amount').value);
        if (!amount) return;
        const category = document.getElementById('add-category').value;
        const desc = document.getElementById('add-desc').value || '';
        transactions.unshift({
            id: Date.now(),
            date: new Date().toISOString().slice(0,10),
            type,
            amount,
            currency: baseCurrency,
            category,
            desc
        });
        saveData();
        hideAddModal();
        renderDashboard();
    }

    function deleteTransaction(id) {
        if (confirm('Удалить операцию?')) {
            transactions = transactions.filter(t => t.id !== id);
            saveData();
            renderTransactions();
        }
    }

    function addNewCategory() {
        const name = prompt('Название новой категории:');
        if (name && name.trim()) {
            categories.push(name.trim());
            saveData();
            renderCategories();
        }
    }

    function deleteCategory(cat) {
        if (confirm(`Удалить категорию «${cat}»?`)) {
            categories = categories.filter(c => c !== cat);
            saveData();
            renderCategories();
        }
    }

    function clearAllData() {
        if (confirm('Очистить все данные?')) {
            localStorage.clear();
            location.reload();
        }
    }

    function switchPage(page) {
        currentPage = page;
        if (page === 'dashboard') renderDashboard();
        else if (page === 'transactions') renderTransactions();
        else if (page === 'categories') renderCategories();
        else if (page === 'converter') renderConverter();
        else if (page === 'settings') renderSettings();
    }

    function updateNavActive() {
        // Можно доработать подсветку при необходимости
    }

    async function initApp() {
        const tg = window.Telegram?.WebApp || {ready:()=>{}, expand:()=>{}};
        tg.ready(); tg.expand();
        loadData();
        await loadRates();
        document.getElementById('user-info').innerHTML = `👋 ${baseCurrency}`;
        renderDashboard();
    }

    window.onload = initApp;
</script>
</body>
</html>
